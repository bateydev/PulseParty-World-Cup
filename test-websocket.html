<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>PulseParty WebSocket Test</h1>
    <div id="status">Connecting...</div>
    <div id="log"></div>
    
    <script>
        const wsUrl = 'wss://fpdd170hf8.execute-api.us-east-1.amazonaws.com/prod';
        const userId = 'test-user-' + Date.now();
        const locale = 'en';
        
        // Build URL with query parameters
        const url = new URL(wsUrl);
        url.searchParams.set('userId', userId);
        url.searchParams.set('locale', locale);
        
        console.log('Connecting to:', url.toString());
        document.getElementById('log').innerHTML += `<p>Connecting to: ${url.toString()}</p>`;
        
        const ws = new WebSocket(url.toString());
        
        ws.onopen = () => {
            console.log('WebSocket connected!');
            document.getElementById('status').textContent = 'Connected ✅';
            document.getElementById('log').innerHTML += '<p style="color: green;">✅ Connected!</p>';
            
            // Try to create a room
            const message = {
                action: 'createRoom',
                payload: {
                    theme: 'Club',
                    matchId: 'match-club-1'
                }
            };
            console.log('Sending:', message);
            document.getElementById('log').innerHTML += `<p>Sending: ${JSON.stringify(message)}</p>`;
            ws.send(JSON.stringify(message));
        };
        
        ws.onmessage = (event) => {
            console.log('Message received:', event.data);
            document.getElementById('log').innerHTML += `<p style="color: blue;">📨 Received: ${event.data}</p>`;
            
            try {
                const data = JSON.parse(event.data);
                console.log('Parsed message:', data);
            } catch (e) {
                console.error('Failed to parse message:', e);
            }
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            document.getElementById('status').textContent = 'Error ❌';
            document.getElementById('log').innerHTML += `<p style="color: red;">❌ Error: ${JSON.stringify(error)}</p>`;
        };
        
        ws.onclose = (event) => {
            console.log('WebSocket closed:', event);
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('log').innerHTML += `<p style="color: orange;">🔌 Closed: code=${event.code}, reason=${event.reason}, wasClean=${event.wasClean}</p>`;
        };
    </script>
</body>
</html>
